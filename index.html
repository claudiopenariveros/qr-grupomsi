<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador QR — Grupo MSI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3d;--accent:#F6931E;--accent2:#06b6d4;--text:#e8e8f0;--muted:#6b6b8a;--ok:#10b981}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Syne,sans-serif;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(246,147,30,.07),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(6,182,212,.06),transparent 50%);pointer-events:none;z-index:0}
.wrap{max-width:860px;margin:0 auto;padding:48px 24px;position:relative;z-index:1}
header{text-align:center;margin-bottom:44px}
.logo img{height:46px;margin-bottom:24px}
.badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:5px 16px 5px 8px;font-family:"Space Mono",monospace;font-size:11px;color:var(--accent2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
.dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
h1{font-size:clamp(32px,6vw,60px);font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:10px}
h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.status{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:28px}
.sdot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--ok);animation:pulse 2s infinite}
.sdot.loading{background:var(--accent);animation:pulse .8s infinite}
.stxt{font-size:12px;font-family:"Space Mono",monospace;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;margin-bottom:28px;transition:border-color .3s}
.card:focus-within{border-color:var(--accent)}
.lbl{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:block}
.row{display:flex;gap:10px;flex-wrap:wrap}
input.url{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:"Space Mono",monospace;font-size:13px;outline:none;transition:border-color .2s}
input.url:focus{border-color:var(--accent);background:#1a1a28}
input.url::placeholder{color:var(--muted)}
input.nom{width:190px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-family:Syne,sans-serif;font-size:13px;outline:none;transition:border-color .2s}
input.nom:focus{border-color:var(--accent)}
input.nom::placeholder{color:var(--muted)}
.btn-gen{background:var(--accent);border:none;border-radius:12px;padding:13px 26px;color:#fff;font-family:Syne,sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 4px 24px rgba(246,147,30,.35);transition:transform .15s,box-shadow .2s,background .2s}
.btn-gen:hover{background:#e58215;transform:translateY(-2px);box-shadow:0 8px 32px rgba(246,147,30,.45)}
.btn-gen:active{transform:translateY(0)}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none}
.err{font-size:12px;color:#ef4444;margin-top:8px;display:none}
.stats{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sc{font-size:13px;color:var(--muted)}
.sc strong{color:var(--accent2);font-family:"Space Mono",monospace}
.btn-del-all{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 13px;color:var(--muted);font-family:Syne,sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.btn-del-all:hover{border-color:#ef4444;color:#ef4444}
.empty{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-ico{font-size:44px;margin-bottom:14px;opacity:.4}
.list{display:flex;flex-direction:column;gap:14px}
.item{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 22px;display:flex;align-items:center;gap:20px;animation:slideIn .3s ease;transition:border-color .2s,transform .2s}
.item:hover{border-color:var(--accent);transform:translateX(4px)}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.thumb{width:76px;height:76px;flex-shrink:0;border-radius:10px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center}
.thumb canvas,.thumb img{width:76px!important;height:76px!important}
.info{flex:1;min-width:0}
.iname{font-size:14px;font-weight:600;margin-bottom:5px;color:var(--text)}
.iurl{font-family:"Space Mono",monospace;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{font-size:11px;color:var(--muted);margin-top:5px;display:flex;align-items:center;gap:6px}
.ibadge{display:inline-flex;align-items:center;gap:4px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:999px;padding:2px 8px;font-size:10px;color:var(--ok);font-weight:600}
.acts{display:flex;gap:7px;flex-shrink:0}
.btn-a{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:Syne,sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.btn-dl{border-color:rgba(6,182,212,.4);color:var(--accent2)}
.btn-dl:hover{background:rgba(6,182,212,.1);border-color:var(--accent2)}
.btn-rm{border-color:transparent;color:var(--muted)}
.btn-rm:hover{border-color:rgba(239,68,68,.4);color:#ef4444;background:rgba(239,68,68,.08)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);border-radius:12px;padding:11px 22px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:100}
.toast.ok-t{border:1px solid var(--ok);color:var(--ok)}
.toast.err-t{border:1px solid #ef4444;color:#ef4444}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){input.nom{width:100%}.item{flex-wrap:wrap}.acts{width:100%;justify-content:flex-end}}
</style>
</head>

    <div class="badge"><span class="dot"></span>Sin vencimiento</div>
    <h1>Generador de<br><span>Códigos QR</span></h1>
  </header>

  <div class="status">
    <span class="sdot loading" id="sdot"></span>
    <span class="stxt" id="stxt">Conectando...</span>
  </div>

  <div class="card">
    <label class="lbl">Nueva URL</label>
    <div class="row">
      <input type="text" class="url" id="urlIn" placeholder="https://tudominio.com/pagina">
      <input type="text" class="nom" id="nomIn" placeholder="Nombre (opcional)">
      <button class="btn-gen" id="btnGen" onclick="addQR()">Generar QR</button>
    </div>
    <p class="err" id="errMsg">⚠ Ingresa una URL válida (debe comenzar con https://)</p>
  </div>

  <div class="stats" id="stats" style="display:none">
    <span class="sc">Total: <strong id="total">0</strong> códigos</span>
    <button class="btn-del-all" onclick="deleteAll()">Eliminar todos</button>
  </div>

  <div class="empty" id="empty">
    <div class="empty-ico">▦</div>
    <p>Aún no hay códigos QR. Ingresa una URL arriba para comenzar.</p>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'a0.Zvz4cSFtpQ8BC0ic3ew9uqRoW';
const BIN = '69c439fac3097a1dd55d2e35';
const API = 'https://api.jsonbin.io/v3/b/' + BIN;
let polling = null;
let lastSig = '';
let busy = false;

async function apiFetch(method, body) {
  const opts = {
    method,
    headers: { 'X-Access-Key': KEY, 'X-Bin-Versioning': 'false' }
  };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(method === 'GET' ? API + '/latest' : API, opts);
  if (!r.ok) {
    const t = await r.text().catch(() => '');
    throw new Error(r.status + ': ' + t.slice(0, 120));
  }
  return r.json();
}

async function read() {
  const d = await apiFetch('GET');
  return Array.isArray(d.record?.qrcodes) ? d.record.qrcodes : [];
}

async function write(qrcodes) {
  await apiFetch('PUT', { qrcodes });
}

function status(state, msg) {
  document.getElementById('sdot').className = 'sdot ' + state;
  document.getElementById('stxt').textContent = msg;
}

async function init() {
  status('loading', 'Conectando a base de datos...');
  try {
    const items = await read();
    status('ok', 'Conectado — lista compartida activa');
    render(items);
    startPoll();
  } catch(e) {
    status('', 'Error: ' + e.message);
    toast('⚠ ' + e.message, 'err');
  }
}

function startPoll() {
  if (polling) clearInterval(polling);
  polling = setInterval(async () => {
    try {
      const items = await read();
      const sig = JSON.stringify(items);
      if (sig !== lastSig) { lastSig = sig; render(items); }
    } catch(_) {}
  }, 6000);
}

async function addQR() {
  if (busy) return;
  const urlEl = document.getElementById('urlIn');
  const nomEl = document.getElementById('nomIn');
  const errEl = document.getElementById('errMsg');
  const url = urlEl.value.trim();

  if (!url) { showErr(errEl, urlEl); return; }
  let parsed;
  try { parsed = new URL(url); } catch(_) { showErr(errEl, urlEl); return; }
  if (!['http:','https:'].includes(parsed.protocol)) { showErr(errEl, urlEl); return; }

  const name = nomEl.value.trim() || parsed.hostname;
  const id = Date.now();
  const date = new Date().toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'short' });

  busy = true;
  const btn = document.getElementById('btnGen');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  urlEl.value = ''; nomEl.value = ''; errEl.style.display = 'none';

  try {
    const items = await read();
    items.unshift({ id, url, name, date });
    await write(items);
    render(items);
    toast('✓ QR creado y compartido', 'ok');
  } catch(e) {
    toast('⚠ ' + e.message, 'err');
    urlEl.value = url;
  } finally {
    busy = false;
    btn.disabled = false;
    btn.textContent = 'Generar QR';
  }
}

function showErr(errEl, urlEl) {
  errEl.style.display = 'block';
  urlEl.style.borderColor = '#ef4444';
  setTimeout(() => { errEl.style.display = 'none'; urlEl.style.borderColor = ''; }, 3000);
}

async function removeQR(id) {
  try {
    const items = await read();
    const updated = items.filter(i => i.id !== id);
    await write(updated);
    render(updated);
  } catch(e) { toast('⚠ ' + e.message, 'err'); }
}

async function deleteAll() {
  if (!confirm('¿Eliminar todos los QRs para todos los usuarios?')) return;
  try { await write([]); render([]); } catch(e) { toast('⚠ ' + e.message, 'err'); }
}

function render(items) {
  lastSig = JSON.stringify(items);
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  document.getElementById('total').textContent = items.length;
  if (!items.length) { empty.style.display='block'; stats.style.display='none'; list.innerHTML=''; return; }
  empty.style.display = 'none'; stats.style.display = 'flex';
  list.innerHTML = items.map(it => `
    <div class="item">
      <div class="thumb" id="qr${it.id}"></div>
      <div class="info">
        <div class="iname">${esc(it.name)}</div>
        <div class="iurl">${esc(it.url)}</div>
        <div class="imeta"><span class="ibadge">● Sin vencimiento</span>${it.date}</div>
      </div>
      <div class="acts">
        <button class="btn-a btn-dl" onclick="dlQR('${esc(it.name)}','${esc(it.url)}')">↓ Descargar</button>
        <button class="btn-a btn-rm" onclick="removeQR(${it.id})">✕</button>
      </div>
    </div>`).join('');
  items.forEach(it => makeQR('qr' + it.id, it.url, 76));
}

function makeQR(elId, url, size) {
  const c = document.getElementById(elId);
  if (!c) return;
  c.innerHTML = '';
  try { new QRCode(c, { text: url, width: size, height: size, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.H }); }
  catch(e) {}
}

function dlQR(name, url) {
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
  document.body.appendChild(tmp);
  new QRCode(tmp, { text: url, width: 512, height: 512, colorDark: '#000', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.H });
  setTimeout(() => {
    const cv = tmp.querySelector('canvas');
    if (cv) { const a = document.createElement('a'); a.download = name + '.png'; a.href = cv.toDataURL('image/png'); a.click(); toast('✓ Descargado: ' + name, 'ok'); }
    document.body.removeChild(tmp);
  }, 250);
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='ok' ? 'ok-t' : 'err-t');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('urlIn').addEventListener('keydown', e => { if(e.key==='Enter') addQR(); });
document.getElementById('nomIn').addEventListener('keydown', e => { if(e.key==='Enter') addQR(); });

init();
</script>
